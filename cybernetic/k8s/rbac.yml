apiVersion: v1
kind: ServiceAccount
metadata:
  name: cybernetic-sa
  namespace: cybernetic

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cybernetic-role
  namespace: cybernetic
rules:
- apiGroups: [""]
  resources: ["pods", "pods/logs"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cybernetic-rolebinding
  namespace: cybernetic
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cybernetic-role
subjects:
- kind: ServiceAccount
  name: cybernetic-sa
  namespace: cybernetic
