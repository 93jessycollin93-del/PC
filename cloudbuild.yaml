steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pc-os-app:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pc-os-app:$COMMIT_SHA'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pc-os-app:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/pc-os-app:latest'
      - '--location=$_REGION'

images:
  - 'gcr.io/$PROJECT_ID/pc-os-app:latest'
  - 'gcr.io/$PROJECT_ID/pc-os-app:$COMMIT_SHA'

substitutions:
  _REGION: 'us-central1'
  _MEMORY: '512Mi'
  _CPU: '1'

options:
  machineType: 'N1_HIGHCPU_8'
