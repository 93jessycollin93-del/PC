steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pc-os:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pc-os:latest'
      - '.'
    waitFor: ['-']

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pc-os:$COMMIT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-cloud-run'
    args:
      - 'deploy'
      - 'pc-os-app'
      - '--image=gcr.io/$PROJECT_ID/pc-os:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--set-env-vars=GOOGLE_PROJECT_ID=$PROJECT_ID,DEPLOYMENT_REGION=us-central1'
    waitFor: ['push-image']

images:
  - 'gcr.io/$PROJECT_ID/pc-os:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pc-os:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
